<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="author" content="Yann" />
  <title data-i18n="video.title">CusCus · 视频看板</title>
  <link rel="icon" type="image/png" href="assets/logo-vertical.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles-brand.css" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body data-tool="video">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <main class="app">
    <nav class="top-nav">
      <a class="brand" href="index.html" data-i18n="common.brand" aria-label="CusCus 工作台"></a>
      <div class="nav-links">
        <a href="index.html" data-i18n="common.nav.home">导航页</a>
        <a href="gmv.html" data-i18n="common.nav.gmv">GMV MAX</a>
        <a href="video.html" class="active" aria-current="page" data-i18n="common.nav.video">视频看板</a>
        <a href="script.html" data-i18n="common.nav.script">脚本生成</a>
        <a href="order.html" data-i18n="common.nav.order">订单分析</a>
      </div>
      <div class="nav-controls">
        <div class="lang-switch">
          <button class="ghost" data-lang="zh" data-i18n="common.lang.zh">中文</button>
          <button class="ghost" data-lang="en" data-i18n="common.lang.en">English</button>
        </div>
        <div class="currency-switch">
          <span class="currency-label" data-i18n="fx.currency">货币</span>
          <button class="ghost" data-currency="IDR">IDR</button>
          <button class="ghost" data-currency="CNY">CNY</button>
        </div>
      </div>
    </nav>

    <header class="hero" id="video">
      <div>
        <p class="eyebrow" data-i18n="video.eyebrow">视频互动 • 链接与缩略图预览</p>
        <h1 data-i18n="video.h1">CusCus视频看板</h1>
        <p class="sub" data-i18n="video.sub">上传 Video List 表格，自动解析视频名称、链接、达人账号与缩略图预览。</p>
      </div>
      <div class="upload-card">
        <div class="upload-title" data-i18n="video.upload.title">导入视频列表</div>
        <label class="upload-btn">
          <span data-i18n="video.upload.button">选择 Excel 文件</span>
          <input id="videoFileInput" type="file" accept=".xlsx,.xls" />
        </label>
        <div class="upload-hint" data-i18n="video.upload.hint">支持 Video List 导出表</div>
        <div id="videoFileMeta" class="upload-meta" data-i18n="video.upload.empty">尚未导入文件</div>
      </div>
    </header>

    <section class="section">
      <div class="section-header">
        <h2 data-i18n="video.section.overview">概览</h2>
        <div id="videoDataStatus" class="pill" data-i18n="status.wait">等待导入</div>
      </div>
      <div class="kpi-grid" id="videoKpiGrid"></div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2 data-i18n="video.section.list">视频列表</h2>
        <div class="section-actions">
          <input id="videoSearchInput" class="search" placeholder="搜索视频名 / 账号" data-i18n-placeholder="video.search.placeholder" />
          <select id="videoSortSelect" class="select">
            <option value="date_desc" data-i18n="video.sort.date">发布时间 从新到旧</option>
            <option value="gmv_desc" data-i18n="video.sort.gmv">GMV 从高到低</option>
            <option value="likes_desc" data-i18n="video.sort.likes">点赞 从高到低</option>
            <option value="comments_desc" data-i18n="video.sort.comments">评论 从高到低</option>
          </select>
          <select id="videoPageSize" class="select">
            <option value="20" selected data-i18n="video.page.size20">每页 20</option>
            <option value="50" data-i18n="video.page.size50">每页 50</option>
            <option value="100" data-i18n="video.page.size100">每页 100</option>
          </select>
        </div>
      </div>
      <div id="videoGrid" class="video-grid"></div>
      <div id="videoPagination" class="pagination"></div>
    </section>
  </main>

  <button id="backToTop" class="back-to-top" aria-label="回到顶部">↑</button>
  <footer class="footer" data-i18n="video.footer">CusCus视频看板</footer>

  <script src="i18n.js"></script>
  <script src="app.js"></script>
  <script>
    (function () {
      var title = '%c✦ Shining Kids By CusCus ✦';
      var line  = '%c  design & build · 杨浩 · 2026  ';
      var hint  = '%cchildren’s skin care · internal workstation';
      var s1 = [
        'background:#FF7500',
        'color:#0E0E0E',
        'font:900 22px/1.6 Nunito,PingFang SC,sans-serif',
        'padding:10px 18px',
        'border-radius:999px',
        'border:3px solid #0E0E0E'
      ].join(';');
      var s2 = [
        'background:#0E0E0E',
        'color:#FFD93D',
        'font:800 13px/1.8 Nunito,PingFang SC,monospace',
        'padding:6px 14px',
        'border-radius:999px',
        'letter-spacing:0.12em',
        'margin-top:6px'
      ].join(';');
      var s3 = [
        'color:#9A7BE8',
        'font:600 11px/1.6 PingFang SC,sans-serif',
        'letter-spacing:0.1em',
        'margin-top:4px'
      ].join(';');
      console.log(title + '\n' + line + '\n' + hint, s1, s2, s3);
    })();
  </script>
</body>
</html>
